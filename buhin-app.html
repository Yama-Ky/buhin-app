.group-btn.active{border-color:#2563eb;background:#2563eb;color:#fff;}
.g-icon{font-size:16px;}
.g-label{font-size:10px;font-weight:700;white-space:nowrap;}
.g-count{font-size:9px;border-radius:10px;padding:1px 5px;background:#161920;color:#6b7280;}

function switchTab(t){
  S.tab=t;
  ["list","report","estimate"].forEach(function(id){
    document.getElementById("page-"+id).style.display=(id===t?"block":"none");
    document.getElementById("tab-"+id).classList.toggle("active",id===t);
  });
  updateBadges();
  if(t==="list")     renderList();
  if(t==="report")   renderReport();
  if(t==="estimate") renderEstimate();
}
function updateBadges(){

  ["report","estimate"].forEach(function(id){
    var btn=document.getElementById("tab-"+id);
    var old=btn.querySelector(".badge");if(old)old.remove();
    if(cnt>0){var b=document.createElement("span");b.className="badge";b.textContent=cnt;btn.appendChild(b);}
  });
}

// ═══ フィルター ══════════════════════════════════════
function getFiltered(){
  var q=S.searchVal.toLowerCase();
  var g=GROUPS.find(function(x){return x.id===S.activeGroup;});
  return MASTER.filter(function(item){
    var inGroup=S.activeGroup==="all"||g.cats.indexOf(item.category)>=0;
    var inCat=S.activeCat==="すべて"||item.category===S.activeCat;
    var inSearch=!q||item.name.indexOf(q)>=0||item.category.indexOf(q)>=0||item.size.indexOf(q)>=0;
    return inGroup&&inCat&&inSearch;
  });
}
function selectGroup(gid){S.activeGroup=gid;S.activeCat="すべて";renderList();}
function selectCat(val){S.activeCat=val;renderList();}
function clearSearch(){S.searchVal="";renderList();}

// ═══ 部材選択 ════════════════════════════════════════
function renderList(){
  var el=document.getElementById("page-list");
  var filtered=getFiltered();
  var cnt=cartCount();
  var g=GROUPS.find(function(x){return x.id===S.activeGroup;});
  var h="";

  // 検索ボックス
  h+='<div class="card search-box">';
  h+='<span style="font-size:16px">🔍</span>';
  h+='<input class="search-input" id="si" type="search" placeholder="品名・カテゴリで検索..." value="'+esc(S.searchVal)+'" oninput="onSearch(this.value)">';
  if(S.searchVal) h+='<button class="search-clear" onclick="clearSearch()" style="border:none;background:none;color:#6b7280;font-size:16px">✕</button>';
  h+='</div>';

  // グループバー（検索中は非表示）
  if(!S.searchVal){
    h+='<div class="group-bar">';
    GROUPS.forEach(function(gr){
      var cnt2=gr.id==="all"?MASTER.length:MASTER.filter(function(m){return gr.cats.indexOf(m.category)>=0;}).length;
      var act=S.activeGroup===gr.id;
      h+='<button class="group-btn'+(act?" active":"")+'" onclick="selectGroup(\''+gr.id+'\')">';
      h+='<span class="g-icon">'+gr.icon+'</span>';
      h+='<span class="g-label">'+gr.label+'</span>';
      h+='<span class="g-count">'+cnt2+'品</span>';
      h+='</button>';
    });
    h+='</div>';

    // カテゴリプルダウン
    if(S.activeGroup!=="all"){
      var allCats=[...new Set(MASTER.map(function(m){return m.category;}))];
      var groupCats=g.cats.filter(function(c){return allCats.indexOf(c)>=0;});
      if(groupCats.length>1){
        var sel=S.activeCat!=="すべて";
        h+='<div class="cat-wrap">';
        h+='<select class="cat-select'+(sel?" selected":"")+'" onchange="selectCat(this.value)">';
        h+='<option value="すべて">── '+esc(g.label)+'すべて ('+groupCats.length+'カテゴリ) ──</option>';
        groupCats.forEach(function(cat){
          var c2=MASTER.filter(function(m){return m.category===cat;}).length;
          h+='<option value="'+esc(cat)+'"'+(S.activeCat===cat?" selected":"")+'>'+esc(cat)+'（'+c2+'品目）</option>';
        });
        h+='</select>';
        h+='<span class="cat-arrow">▼</span>';
        if(sel) h+='<button class="cat-reset" onclick="selectCat(\'すべて\')">✕</button>';
        h+='</div>';
        // 絞り込みバッジ
        if(S.activeGroup!=="all"||S.activeCat!=="すべて"){
          h+='<div class="filter-badge"><span>絞り込み中：</span>';
          if(S.activeGroup!=="all") h+='<span class="fb-group">'+g.icon+' '+g.label+'</span>';
          if(S.activeCat!=="すべて") h+='<span class="fb-cat">'+esc(S.activeCat)+'</span>';
          h+='</div>';
        }
      }
    }
  }

  h+='<div class="count-label">'+filtered.length+'件表示</div>';

  if(filtered.length===0){
    h+='<div class="empty"><div class="empty-icon">🔍</div>該当する部材が見つかりません</div>';
  } else {
    filtered.forEach(function(item){
      var inCart=!!S.cart[item.id];
      var qv=S.qtyInputs[item.id]||"";
      h+='<div class="item-card'+(inCart?" in-cart":"")+'" id="ic-'+item.id+'">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
      h+='<div style="flex:1">';
      h+='<div style="font-size:10px;color:#6b7280;margin-bottom:2px"><span class="cat-tag">'+esc(item.category)+'</span>サイズ: '+esc(item.size)+'</div>';
      h+='<div class="item-name">'+esc(item.name)+'</div>';
      h+='<div style="font-size:13px;color:#e94560;font-weight:700;margin-top:2px">売価 ¥'+fmt(item.price)+' <span style="font-size:11px;color:#6b7280;font-weight:400">/ '+item.unit+'</span><span style="margin-left:8px;font-size:11px;color:#6b7280">仕入 ¥'+fmt(item.cost)+'</span></div>';
      h+='</div>';
      if(inCart) h+='<span class="in-cart-badge">追加済 '+S.cart[item.id].qty+item.unit+'</span>';
      h+='</div>';
      h+='<div class="item-row">';
      h+='<input class="qty-input" id="qty-'+item.id+'" type="number" min="0" step="'+(item.unit==="m"?"0.1":"1")+'" value="'+esc(qv)+'" placeholder="数量（'+item.unit+'）" oninput="S.qtyInputs['+item.id+']=this.value" onkeydown="if(event.key===\'Enter\'){event.preventDefault();doAddAndNext('+item.id+')}" enterkeyhint="next">';
      h+='<button class="add-btn" onclick="doAdd('+item.id+')">追加</button>';
      h+='</div></div>';
    });
  }

  if(cnt>0) h+='<button class="float-btn" onclick="switchTab(\'report\')">📋 '+cnt+'品目 追加済み → 内訳書へ</button>';

  el.innerHTML=h;
  // 検索フォーカス維持
  if(S.searchVal){var si=document.getElementById("si");if(si){si.focus();si.setSelectionRange(9999,9999);}}
}

function onSearch(val){S.searchVal=val;if(val){S.activeGroup="all";S.activeCat="すべて";}renderList();}

function doAddAndNext(id){
  var qtyVal=S.qtyInputs[id];
  var hasQty=qtyVal&&qtyVal!==""&&parseFloat(qtyVal)>0;
  if(hasQty) doAdd(id);
  // 次の項目にフォーカス
  var filt=getFiltered();
  var idx=filt.findIndex(function(m){return m.id===id;});
  if(idx>=0&&idx<filt.length-1){
    var nid=filt[idx+1].id;
    setTimeout(function(){var n=document.getElementById("qty-"+nid);if(n)n.focus();},30);
  }
}

// タンク系カテゴリ（商品欄に移動するもの）
var TANK_CATEGORIES=["灯油タンク","灯油タンク(JA)","灯油タンク部材","灯油タンク部材(JA)"];

function doAdd(id){
  var item=MASTER.find(function(m){return m.id===id;});
  var qtyVal=S.qtyInputs[id];
  // 数量が未入力・空・0の場合は追加しない
  if(!qtyVal||qtyVal===""||parseFloat(qtyVal)<=0) return;
  var qty=parseFloat(qtyVal);

  // タンク系は商品欄（laborRows）に追加
  if(TANK_CATEGORIES.indexOf(item.category)>=0){
    var amount=Math.round(item.price*qty);
    var detail=item.name+(qty!==1?"　"+qty+item.unit+"":"");
    S.laborRows.unshift({id:S.laborId,name:"商品",detail:detail,qty:qty+item.unit,amount:String(amount)});
    S.laborId++;
    S.qtyInputs[id]="";
    updateBadges();
    // カード更新
    var card=document.getElementById("ic-"+id);
    if(card){
      card.classList.add("in-cart");
      var badge=card.querySelector(".in-cart-badge");
      var qInp=document.getElementById("qty-"+id);if(qInp)qInp.value="";
      if(badge) badge.textContent="追加済 "+qty+item.unit;
      else{
        var sp=document.createElement("span");sp.className="in-cart-badge";
        sp.textContent="追加済 "+qty+item.unit;
        var row=card.querySelector("div[style*='justify-content']");if(row)row.appendChild(sp);
      }
    }
    return;
  }

  if(S.cart[id]) S.cart[id].qty=Math.round((S.cart[id].qty+qty)*10)/10;
  else S.cart[id]=Object.assign({},item,{qty:qty});
  S.qtyInputs[id]="";
  updateBadges();
  // カード更新
  var card=document.getElementById("ic-"+id);
  if(card){
    card.classList.add("in-cart");
    var badge=card.querySelector(".in-cart-badge");
    var qInp=document.getElementById("qty-"+id);if(qInp)qInp.value="";
    if(badge) badge.textContent="追加済 "+S.cart[id].qty+item.unit;
    else {
      var sp=document.createElement("span");sp.className="in-cart-badge";
      sp.textContent="追加済 "+S.cart[id].qty+item.unit;
      var row=card.querySelector("div[style*='justify-content']");if(row)row.appendChild(sp);
    }
  }
}

function buildReportTable(items){
  var allItems=items.concat(S.freeItems.filter(function(f){return f.name||parseFloat(f.price)>0;}).map(function(f){
    return{id:"f"+f.id,category:"手入力",name:f.name||"(品名未入力)",size:"-",unit:f.unit||"個",price:parseFloat(f.price)||0,cost:0,qty:parseFloat(f.qty)||1};
  }));
  var total=allItems.reduce(function(s,i){return s+i.price*i.qty;},0);
  var costTotal=allItems.reduce(function(s,i){return s+i.cost*i.qty;},0);
  var tax=Math.round(total*0.1);
  var totalWT=Math.round(total*1.1);
  var cats=[...new Set(allItems.map(function(i){return i.category;}))];
  var catSum=cats.map(function(cat){
    return{cat:cat,count:allItems.filter(function(i){return i.category===cat;}).length,
      sub:allItems.filter(function(i){return i.category===cat;}).reduce(function(s,i){return s+i.price*i.qty;},0)};
  });
  var cols="24px 1fr 36px 36px 52px 62px 62px 70px";
  var rows="";
  allItems.forEach(function(item,idx){
    rows+='<div class="tbl-row '+(idx%2===0?"even":"odd")+'" style="grid-template-columns:'+cols+'">';
    rows+='<div style="font-size:10px;color:#6b7280;font-weight:700">'+String(idx+1).padStart(2,"0")+'</div>';
    rows+='<div style="font-size:13px;font-weight:600">'+esc(item.name)+'</div>';
    rows+='<div style="text-align:center;font-size:11px;color:#9ca3af">'+esc(item.size)+'</div>';
    rows+='<div style="text-align:center;font-size:13px;color:#9ca3af">'+item.unit+'</div>';
    rows+='<div style="text-align:center"><input class="tbl-qty-input" type="number" min="0" step="0.1" value="'+item.qty+'" oninput="updateRQty('+item.id+',this.value)"></div>';
    rows+='<div style="text-align:right;font-size:13px;color:#9ca3af">¥'+fmt(item.price)+'</div>';
    rows+='<div style="text-align:right;font-size:11px;color:#6b7280">¥'+fmt(item.cost)+'</div>';
    rows+='<div style="text-align:right;font-size:13px;font-weight:700">¥'+fmt(item.price*item.qty)+'</div>';
    rows+='</div>';
  });
  var catRows="";
  catSum.forEach(function(cs){
    catRows+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #252a3a;font-size:13px"><span style="color:#9ca3af">'+esc(cs.cat)+'（'+cs.count+'品目）</span><span style="font-weight:700">¥'+fmt(cs.sub)+'</span></div>';
  });
  var delRows="";
  allItems.forEach(function(item){
    var isFree=String(item.id).charAt(0)==="f";
    delRows+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #252a3a;font-size:12px;color:#9ca3af">';
    delRows+='<span>'+esc(item.name)+'（'+item.qty+item.unit+'）</span>';
    if(isFree) delRows+='<button class="del-btn" onclick="delFree('+item.id.slice(1)+');renderReport()">削除</button>';
    else       delRows+='<button class="del-btn" onclick="removeCart('+item.id+')">削除</button>';
    delRows+='</div>';
  });
  var h='<button class="print-btn" onclick="printReport()">🖨️ &nbsp;内訳書をPDFで保存</button>';
  h+='<div id="r-print-area" style="border-radius:10px;overflow:hidden;border:1px solid #252a3a;margin-bottom:10px">';
  h+='<div class="ph"><div class="ph-row">';
  h+='<div><div style="font-size:9px;color:#e94560;letter-spacing:3px;font-weight:700;margin-bottom:3px">MATERIAL LIST</div><div style="font-size:18px;font-weight:800">工 事 部 材 内 訳 書</div><div style="font-size:13px;margin-top:4px;color:#9ca3af">'+esc(S.rProject)+'</div></div>';
  h+='<div class="ph-right"><div style="font-size:10px;color:#6b7280">作成日</div><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+esc(S.rDate)+'</div><div style="font-size:10px;color:#6b7280">作成者</div><div style="font-size:12px;font-weight:600">'+esc(S.rCompany)+'</div></div>';
  h+='</div>';
  h+='<div class="total-banner"><div style="font-size:11px;color:#6b7280;line-height:1.7">税抜合計(売価) ¥'+fmt(total)+'<br>消費税（10%）¥'+fmt(tax)+'</div><div><div style="font-size:10px;color:#6b7280">税込合計金額</div><div class="total-amount">¥'+fmt(totalWT)+'</div></div></div>';
  h+='</div>';
  h+='<div class="tbl-head" style="grid-template-columns:'+cols+'">';
  ["No.","品名","S","単位","数量","売価","仕入","金額(売)"].forEach(function(hd,i){h+='<div style="text-align:'+(i>=5?"right":i>=2?"center":"left")+'">'+hd+'</div>';});
  h+='</div>'+rows;
  h+='<div class="sub-row" style="border-top:2px solid #2563eb;background:#161920"><span style="font-size:13px;color:#6b7280">小　計（売価・税抜）</span><span style="font-size:13px;font-weight:800">¥'+fmt(total)+'</span></div>';
  h+='<div class="sub-row" style="background:#161920"><span style="font-size:12px;color:#6b7280">仕入合計</span><span style="font-size:12px;color:#6b7280">¥'+fmt(costTotal)+'</span></div>';
  h+='<div class="sub-row" style="background:#161920"><span style="font-size:12px;color:#6b7280">粗利（売価－仕入）</span><span style="font-size:12px;color:#22c55e;font-weight:700">¥'+fmt(total-costTotal)+'</span></div>';
  h+='<div class="sub-row" style="background:#161920"><span style="font-size:13px;color:#6b7280">消費税（10%）</span><span style="font-size:13px;color:#9ca3af">¥'+fmt(tax)+'</span></div>';
  h+='<div class="grand-row"><div class="grand-inner"><span style="color:#fff;font-weight:800;font-size:14px">合　計（税込）</span><span style="color:#e94560;font-weight:900;font-size:15px">¥'+fmt(totalWT)+'</span></div></div>';
  h+='<div style="padding:12px 14px;background:#1c2030"><div class="section-title">カテゴリ別内訳</div>'+catRows+'</div>';
  h+='<div style="background:#161920;padding:10px 14px;border-top:1px solid #252a3a;font-size:10px;color:#6b7280;text-align:center">本内訳書は工事部材費のみの内訳です。施工費・諸経費は別途となります。</div>';
  h+='</div>';
  h+='<div class="card"><div class="section-title">選択中の部材</div>'+delRows+'</div>';
  return h;
}

function updateRQty(id,val){
  var qty=parseFloat(val);
  if(!qty||qty<=0){delete S.cart[id];renderReport();updateBadges();return;}
  if(S.cart[id])S.cart[id].qty=qty;
}
function removeCart(id){delete S.cart[id];renderReport();updateBadges();}
function printReport(){
  var el=document.getElementById("r-print-area");if(!el)return;
  var win=window.open("","_blank");
  win.document.write('<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>部材内訳書</title><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:\'Hiragino Kaku Gothic ProN\',sans-serif;background:#fff;color:#111;font-size:12px;}div,span{background:#fff!important;color:#111!important;border-color:#ccc!important;}input{background:#fff!important;color:#111!important;border:1px solid #ccc!important;border-radius:4px;padding:3px;font-size:11px;text-align:center;width:100%;}@page{margin:12mm;}</style></head><body>'+el.outerHTML+'</body></html>');
  win.document.close();win.focus();setTimeout(function(){win.print();},300);
}

// 合計計算（共通）
function calcTotals(){
  var items=cartItems();
  var validLabor=S.laborRows.filter(function(r){return parseFloat(r.amount)!==0||r.name;});
  var freeTotal=S.freeItems.reduce(function(s,f){return s+(parseFloat(f.price)||0)*(parseFloat(f.qty)||0);},0);
  var matTotal=items.reduce(function(s,i){return s+i.price*i.qty;},0)+freeTotal;
  var labTotal=validLabor.reduce(function(s,r){return s+(parseFloat(r.amount)||0);},0);
  var subtotal=matTotal+labTotal;
  var grand=Math.round(subtotal*1.1);
  var tgtNum=parseFloat(String(S.targetTotal).replace(/,/g,""));
  var autoDis=(!isNaN(tgtNum)&&tgtNum>0&&tgtNum<grand)?Math.round(subtotal-tgtNum/1.1):0;
  if(autoDis<0)autoDis=0;
  var finalSub=subtotal-autoDis;
  return{items:items,validLabor:validLabor,matTotal:matTotal,labTotal:labTotal,
    subtotal:subtotal,tax:Math.round(subtotal*0.1),grand:grand,autoDis:autoDis,
    finalSub:finalSub,finalTax:Math.round(finalSub*0.1),finalTotal:Math.round(finalSub*1.1),
    hasContent:items.length>0||S.freeItems.length>0||validLabor.some(function(r){return parseFloat(r.amount)!==0;})
  };
}

// 手入力フォームだけ再描画（入力中に呼ばれても合計部分は触らない）
function renderFreeForm(){
  var el=document.getElementById("free-form");if(!el)return;
  var h='<div style="font-size:11px;color:#3b82f6;font-weight:700;margin-bottom:8px">＋ 部材を手入力で追加</div>';
  S.freeItems.forEach(function(f){
    h+='<div style="background:#161920;border-radius:8px;padding:9px 10px;margin-bottom:7px;border:1px solid #252a3a">';
    h+='<div style="display:grid;grid-template-columns:1fr 28px;gap:6px;align-items:center;margin-bottom:6px">';
    h+='<input class="labor-input" value="'+esc(f.name)+'" placeholder="品名" onblur="saveFree('+f.id+',\'name\',this.value)">';
    h+='<button onclick="delFree('+f.id+')" style="border:none;background:none;color:#6b7280;font-size:18px;cursor:pointer;line-height:1">✕</button>';
    h+='</div>';
    // カテゴリ（グループ名）入力
    h+='<input class="labor-input" style="margin-bottom:6px" value="'+esc(f.groupName||"")+'" placeholder="分類名（例：給湯部材・灯油部材）" onblur="saveFree('+f.id+',\'groupName\',this.value)">';
    h+='<div style="display:grid;grid-template-columns:60px 50px 1fr;gap:6px">';
    h+='<input class="labor-input" type="number" min="0" step="0.1" style="text-align:center" value="'+esc(f.qty)+'" placeholder="数量" onblur="saveFree('+f.id+',\'qty\',this.value)">';
    h+='<input class="labor-input" style="text-align:center" value="'+esc(f.unit)+'" placeholder="単位" onblur="saveFree('+f.id+',\'unit\',this.value)">';
    h+='<input class="labor-input" type="number" min="0" style="text-align:right" value="'+esc(f.price)+'" placeholder="単価（税抜）" onblur="saveFree('+f.id+',\'price\',this.value)">';
    h+='</div></div>';
  });
  h+='<button class="add-labor-btn" onclick="addFree()">＋ 部材を追加</button>';
  el.innerHTML=h;
}

function renderEV(){
  var el=document.getElementById("ev");if(!el)return;
  var T=calcTotals();
  if(!T.hasContent){
    el.innerHTML='<div class="card empty"><div class="empty-icon">📄</div><div>部材か工賃を追加してください</div></div>';
    return;
  }
  var cols3="1fr 90px 90px";
  // laborRowsを前半（商品・作業料系）と後半（諸経費・工具損料・値引き）に分ける
  var BOTTOM_ITEMS=["諸経費","工具損料","値引き"];
  var laborTop=T.validLabor.filter(function(r){return BOTTOM_ITEMS.indexOf(r.name)<0;});
  var laborBottom=T.validLabor.filter(function(r){return BOTTOM_ITEMS.indexOf(r.name)>=0;});

  // 見積テーブル行（前半）
  var estRows=[];
  laborTop.forEach(function(r){
    if(r.name||parseFloat(r.amount)!==0){
      var dn=r.name==="商品"?(r.detail||"商品"):r.name==="自由入力"?(r.detail||"自由入力"):r.name||"作業費";
      var isDis=false;
      var amt=parseFloat(r.amount)||0;
      estRows.push({name:dn,sub:"",qty:r.qty||"1式",amount:amt,isDis:isDis});
    }
  });
  // 工事部材をグループ別に集計して行追加
  var groupOrder=["配管系","タンク系","エアコン","手入力"];
  var groupMap={"配管系":[],"タンク系":[],"エアコン":[],"手入力":[]};
  var pipeCategories=["プレシールコア","HTLP","HTVP","灯油配管"];
  var tankCategories=["灯油タンク","灯油タンク(JA)","灯油タンク部材","灯油タンク部材(JA)"];
  var airconCategories=["エアコン"];
  T.items.forEach(function(item){
    if(pipeCategories.indexOf(item.category)>=0) groupMap["配管系"].push(item);
    else if(tankCategories.indexOf(item.category)>=0) groupMap["タンク系"].push(item);
    else if(airconCategories.indexOf(item.category)>=0) groupMap["エアコン"].push(item);
    else groupMap["手入力"].push(item);
  });
  S.freeItems.forEach(function(f){
    var fqty=parseFloat(f.qty)||0,fprice=parseFloat(f.price)||0;
    if(!f.name&&!fprice)return;
    var grpName=f.groupName||"手入力";
    if(!groupMap[grpName]) groupMap[grpName]=[];
    groupMap[grpName].push({isFree:true,name:f.name||"品名未入力",qty:fqty,unit:f.unit||"個",price:fprice,category:grpName});
  });
  // グループ順に行追加（カスタムグループも含む）
  var allGroups=groupOrder.concat(Object.keys(groupMap).filter(function(k){return groupOrder.indexOf(k)<0;}));
  allGroups.forEach(function(grp){
    var gitems=groupMap[grp];
    if(!gitems||gitems.length===0)return;
    var grpTotal=gitems.reduce(function(s,i){return s+i.price*(parseFloat(i.qty)||0);},0);
    var label=grp==="配管系"?"給湯・配管部材一式":grp==="タンク系"?"灯油タンク部材一式":grp==="エアコン"?"エアコン部材一式":grp+"一式";
    estRows.push({name:label,sub:"部材内訳書参照",qty:"一式",amount:grpTotal,isDis:false,isGroup:true});
  });
  if(T.autoDis>0) estRows.push({name:"値引き",sub:"",qty:"一式",amount:-T.autoDis,isDis:true});
  // 後半（諸経費・工具損料・値引き）を部材の後に追加
  laborBottom.forEach(function(r){
    if(r.name||parseFloat(r.amount)!==0){
      var dn=r.name==="値引き"?"値引き":r.name==="自由入力"?(r.detail||"自由入力"):r.name||"作業費";
      var isDis=r.name==="値引き";
      var amt=isDis?-Math.abs(parseFloat(r.amount)||0):(parseFloat(r.amount)||0);
      estRows.push({name:dn,sub:"",qty:r.qty||"1式",amount:amt,isDis:isDis});
    }
  });

  var eRows="";
  estRows.forEach(function(row,idx){
    eRows+='<div class="tbl-row '+(idx%2===0?"even":"odd")+'" style="grid-template-columns:'+cols3+'">';
    eRows+='<div><div style="font-size:13px;font-weight:600">'+esc(row.name)+'</div>'+(row.sub?'<div style="font-size:10px;color:#6b7280">'+esc(row.sub)+'</div>':'')+'</div>';
    eRows+='<div style="text-align:center;font-size:13px;color:#9ca3af">'+esc(row.qty)+'</div>';
    eRows+='<div style="text-align:right;font-size:13px;font-weight:700;color:'+(row.isDis?"#e94560":"inherit")+'">'+(row.isDis?"△"+fmt(Math.abs(row.amount)):"¥"+fmt(row.amount))+'</div>';
    eRows+='</div>';
  });

  // 工事部材内訳（グループ別）
  var matList="";
  allGroups.forEach(function(grp){
    var gitems=groupMap[grp];
    if(!gitems||gitems.length===0)return;
    var grpTotal=gitems.reduce(function(s,i){return s+i.price*(parseFloat(i.qty)||0);},0);
    var label=grp==="配管系"?"給湯・配管部材":grp==="タンク系"?"灯油タンク部材":grp==="エアコン"?"エアコン部材":grp;
    matList+='<div style="margin-bottom:10px">';
    matList+='<div style="font-size:11px;font-weight:700;color:#3b82f6;padding:4px 0;border-bottom:1px solid #2563eb;margin-bottom:4px">'+esc(label)+'　計 ¥'+fmt(grpTotal)+'</div>';
    gitems.forEach(function(item){
      matList+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #252a3a">';
      if(item.isFree){
        matList+='<span style="font-size:12px;color:#9ca3af">'+esc(item.name)+'（'+item.qty+item.unit+'）</span>';
      } else {
        matList+='<div><span style="font-size:10px;background:#161920;border-radius:4px;padding:1px 6px;margin-right:5px;color:#6b7280;font-weight:600">'+esc(item.category)+'</span>';
        matList+='<span style="font-size:12px;color:#9ca3af">'+esc(item.name)+'（'+item.qty+item.unit+'）</span></div>';
      }
      matList+='<span style="font-size:12px;font-weight:600;white-space:nowrap;margin-left:8px">¥'+fmt(item.price*(parseFloat(item.qty)||0))+'</span></div>';
    });
    matList+='</div>';
  });

  var h='<button class="print-btn" onclick="printEstimate()">🖨️ &nbsp;見積書をPDFで保存</button>';
  h+='<div id="e-print-area" style="border-radius:10px;overflow:hidden;border:1px solid #252a3a;margin-bottom:10px">';
  // ヘッダー
  h+='<div class="ph"><div class="ph-row">';
  h+='<div><div style="font-size:9px;color:#e94560;letter-spacing:3px;font-weight:700;margin-bottom:3px">ESTIMATE</div>';
  h+='<div style="font-size:18px;font-weight:800">御 見 積 書</div>';
  h+='<div style="font-size:13px;margin-top:4px;color:#9ca3af">'+esc(S.eProject)+'</div></div>';
  h+='<div class="ph-right"><div style="font-size:10px;color:#6b7280">作成日</div><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+esc(S.eDate)+'</div>';
  h+='<div style="font-size:10px;color:#6b7280">有効期限</div><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+esc(S.eExpire)+'</div>';
  h+='<div style="font-size:10px;color:#6b7280">作成者</div><div style="font-size:12px;font-weight:600">'+esc(S.eCompany)+'</div></div></div>';
  var dispGrand=T.autoDis>0?T.finalTotal:T.grand;
  h+='<div class="total-banner"><div style="font-size:13px;font-weight:600">'+esc(S.eClient)+'<br><span style="font-size:10px;color:#6b7280;font-weight:400">下記の通りお見積り申し上げます</span></div>';
  h+='<div><div style="font-size:10px;color:#6b7280">お見積金額（税込）</div><div class="total-amount">¥'+fmt(dispGrand)+'</div></div></div>';
  h+='</div>';
  // テーブル
  h+='<div class="tbl-head" style="grid-template-columns:'+cols3+'"><div>項目</div><div style="text-align:center">数量</div><div style="text-align:right">金額（税抜）</div></div>';
  h+=eRows;
  // 小計・値引き・値引後小計・消費税・合計
  h+='<div class="sub-row" style="border-top:2px solid #2563eb;background:#161920"><span style="font-size:13px;color:#6b7280">小　計（税抜）</span><span style="font-size:13px;font-weight:800">¥'+fmt(T.subtotal)+'</span></div>';
  if(T.autoDis>0){
    h+='<div class="sub-row" style="background:#161920"><span style="font-size:13px;color:#e94560;font-weight:700">値引き</span><span style="font-size:13px;color:#e94560;font-weight:700">△¥'+fmt(T.autoDis)+'</span></div>';
    h+='<div class="sub-row" style="background:#161920;border-top:1px solid #252a3a"><span style="font-size:13px;color:#6b7280">値引後　小　計（税抜）</span><span style="font-size:13px;font-weight:800">¥'+fmt(T.finalSub)+'</span></div>';
  }
  h+='<div class="sub-row" style="background:#161920"><span style="font-size:13px;color:#6b7280">消費税（10%）</span><span style="font-size:13px;color:#9ca3af">¥'+fmt(T.autoDis>0?T.finalTax:T.tax)+'</span></div>';
  h+='<div class="grand-row"><div class="grand-inner">';
  h+='<span style="color:#fff;font-weight:800;font-size:14px">合　計（税込）</span>';
  h+='<span style="color:#e94560;font-weight:900;font-size:15px">¥'+fmt(T.autoDis>0?T.finalTotal:T.grand)+'</span>';
  h+='</div>';
  // 値引き目標入力
  h+='<div class="target-wrap no-print"><div style="font-size:10px;color:#6b7280;margin-bottom:5px">税込希望金額を入力すると自動で値引きを計算します</div>';
  h+='<div style="display:flex;gap:8px;align-items:center"><span style="font-size:13px;color:#6b7280">¥</span>';
  h+='<input id="target-inp" class="target-input'+(T.autoDis>0?" active-border":"")+'" type="number" min="0" inputmode="numeric" value="'+esc(S.targetTotal)+'" placeholder="'+fmt(T.grand)+'"';
  h+=' onblur="applyTarget(this.value)" onkeydown="if(event.key===\'Enter\'){applyTarget(this.value);this.blur();}">';
  if(S.targetTotal) h+='<button onclick="S.targetTotal=\'\';renderEV()" style="border:none;background:none;color:#6b7280;font-size:16px;cursor:pointer">✕</button>';
  h+='</div></div></div>';
  // 工事部材内訳（確定済み表示 ＋ 手入力フォームはid=free-formで独立）
  h+='<div class="mat-detail" style="padding:12px 14px;background:#1c2030">';
  h+='<div class="section-title">工事部材 内訳</div>';
  h+=matList;
  h+='<div id="free-form" style="margin-top:10px;padding-top:10px;border-top:1px dashed #252a3a"></div>';
  h+='</div>';
  h+='<div style="background:#161920;padding:10px 14px;border-top:1px solid #252a3a;font-size:10px;color:#6b7280;text-align:center">※ 本見積書の有効期限は '+esc(S.eExpire)+' です。<br>※ 工事内容の変更により金額が変動する場合があります。</div>';
  h+='</div>';
  el.innerHTML=h;
  // 手入力フォームを独立描画
  renderFreeForm();
}

function setJA(val){S.isJA=val;renderEstimate();}
function addLabor(){S.laborRows.push({id:S.laborId,name:"商品",detail:"",qty:"1式",amount:""});S.laborId++;renderEstimate();}
function delLabor(id){S.laborRows=S.laborRows.filter(function(r){return r.id!==id;});renderEstimate();}
function updateLabor(id,key,val){var r=S.laborRows.find(function(r){return r.id===id;});if(r){r[key]=val;renderEV();}}
function onLaborName(id,name){
  var r=S.laborRows.find(function(r){return r.id===id;});
  if(r){r.name=name;var p=LABOR_PRESETS[name];if(p)r.amount=String(S.isJA?p.ja:p.general);}
  renderEstimate();
}
function addFree(){S.freeItems.push({id:S.freeItemId,name:"",qty:"1",unit:"個",price:""});S.freeItemId++;renderEV();}
function delFree(id){S.freeItems=S.freeItems.filter(function(f){return f.id!==id;});renderEV();}
// onblurで呼ばれる：状態保存→合計だけ再計算
function saveFree(id,key,val){
  var f=S.freeItems.find(function(f){return f.id===id;});
  if(f){f[key]=val;}
  // 合計バナーだけ更新（フォームは触らない）
  var T=calcTotals();
  var banner=document.querySelector(".total-amount");
  if(banner) banner.textContent="¥"+fmt(T.autoDis>0?T.finalTotal:T.grand);
}
function applyTarget(val){S.targetTotal=val;renderEV();}
function printEstimate(){
  var el=document.getElementById("e-print-area");if(!el)return;
  var win=window.open("","_blank");
  win.document.write('<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>御見積書</title><style>'
    +'*{box-sizing:border-box;margin:0;padding:0;}'
    +'body{font-family:\'Hiragino Kaku Gothic ProN\',sans-serif;background:#fff;color:#111;font-size:12px;}'
    +'div,span{background:#fff!important;color:#111!important;border-color:#ccc!important;}'
    +'input{background:#fff!important;color:#111!important;border:1px solid #ccc!important;border-radius:4px;padding:3px;font-size:11px;text-align:center;width:100%;}'
    +'@page{margin:12mm;}'
    // 値引後小計を印刷時非表示
    +'.no-print{display:none!important;}'
    // 工事部材内訳を2ページ目に
    +'.page-break{page-break-before:always;break-before:page;padding-top:8mm;}'
    +'</style></head><body>'+el.outerHTML+'</body></html>');
  win.document.close();win.focus();setTimeout(function(){win.print();},300);
}

// ═══ 初期描画 ════════════════════════════════════════
renderList();
</script>
